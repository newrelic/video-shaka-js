<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaka HLS Player</title>
    <link href="https://cdn.jsdelivr.net/npm/shaka-player@5.0.4/dist/controls.min.css" rel="stylesheet">

    <!-- newrelic tracker -->
    <script src="../dist/umd/newrelic-video-shaka.min.js"></script>

    <!-- shaka -->
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5.0.4/dist/shaka-player.compiled.min.js"></script>

  </head>
  <body>
    <video
      id="myPlayer"
      width="640"
      height="480"
      crossorigin="anonymous"
      controls
    ></video>
    <script>
      async function initPlayer() {
        // Find the video element.
        var video = document.getElementById('myPlayer');

        // Construct a Player and attach the video element.
        var player = new shaka.Player();
        await player.attach(video);

        // Attach the player to the window so that it can be easily debugged.
        // window.player = player

        // // source
        var source = 'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8';

        // Load the source into the Player.
        try {
          window.player = player;
          await player.load(source);
          const options = {
            info: {
              beacon: 'xxxxxxxxxxx',
              licenseKey: 'xxxxxxxxxxx',
              applicationID: 'xxxxxxxxxxxx',
            },
          };

          const tracker = new ShakaTracker(player, options);


        } catch (e) {
          console.error(e.message);
        }
      }

      document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
  </body>
</html>
